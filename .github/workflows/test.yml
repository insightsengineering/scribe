name: Test 🧪

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test 🔍
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - 1.26.1
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo 🛎
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go 🐹
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup R required for tests
        uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2

      - name: Run Tests 🧨
        run: make test

      - name: Check whether JUnit XML report exists 🚦
        id: check-junit-xml
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3
        with:
          files: junit-report.xml

      - name: Publish Unit Test Summary 📑
        uses: EnricoMi/publish-unit-test-result-action@2ceeed2b8f26e15b06c3846719f75354febd9e7b # v2
        id: test-results
        if: steps.check-junit-xml.outputs.files_exists == 'true' && github.event_name == 'pull_request'
        with:
          check_name: Unit Tests Summary
          junit_files: junit-report.xml

      - name: Check whether coverage reports exists 💭
        id: check-coverage-reports
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3
        with:
          files: >-
            coverage.xml,
            coverage.html

      - name: Post coverage report 🗞
        if: steps.check-coverage-reports.outputs.files_exists == 'true'
        uses: insightsengineering/coverage-action@v2
        with:
          path: coverage.xml
          threshold: 80
          fail: false
          publish: true
          diff: true
          coverage-reduction-failure: true
          new-uncovered-statements-failure: true
        continue-on-error: true

      - name: Upload report 🔼
        if: steps.check-coverage-reports.outputs.files_exists == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: |
            coverage.html
        continue-on-error: true

  compilation:
    name: Build 🏗
    strategy:
      matrix:
        go-version:
          - 1.26.1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo 🛎
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go 🐹
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Check if compilation works 🧱
        run: make build
